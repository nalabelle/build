name: "CI"

on:
  workflow_call:
    inputs:
      earthly_version:
        default: 'latest'
        required: false
        type: string
      workdir:
        required: false
        type: string
      target:
        default: '+build-all-platforms'
        required: false
        type: string
      cache:
        required: false
        type: string
      release:
        required: false
        default: false
        type: boolean
      release_name:
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  EARTHLY_REMOTE_CACHE: ${{ inputs.cache }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_COLOR: 1
    steps:
      - name: Set up QEMU for multi-platform builds
        id: qemu
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3 # v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: all
      - uses: earthly/actions-setup@v1
        with:
          version: ${{ inputs.earthly_version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Target
        if: ${{ (github.event_name != 'push' || github.ref_name != 'main') }}
        working-directory: ${{ inputs.workdir }}
        run: earthly --secret GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} --strict --push "${{ inputs.target }}"
      - name: Build Target and Push
        # Only push if this was a merge to main
        if: ${{ (github.event_name == 'push' && github.ref_name == 'main') }}
        working-directory: ${{ inputs.workdir }}
        run: earthly --secret GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} --strict --push "${{ inputs.target }}"
      - name: Release
        uses: softprops/action-gh-release@v2
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) && inputs.release && inputs.release_name != '' }}
        with:
          files: dist/*
